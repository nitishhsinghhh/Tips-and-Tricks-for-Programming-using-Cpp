# VERSION     : 1.0                                                  */
#                                                                    */
# DESCRIPTION : Automatically purges GitHub Actions caches older     */
#               than 7 days. Ensures the 10GB repository limit is    */
#               not exceeded to prevent CI failure across the        */
#               polyglot build matrix (C++ & .NET).                  */
#                                                                    */
# SIDE EFFECTS: Irreversibly deletes cache blobs. May increase build */
#               times slightly on the first run post-cleanup.        */

name: C++ CI Working Application

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]   # Cross-platform builds
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      # -------------------------------
      # Checkout repository
      # -------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------
      # Cache CMake build artifacts
      # -------------------------------
      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: Working_Application/String_Conversion/build
          key: ${{ runner.os }}-cmake-${{ hashFiles('Working_Application/String_Conversion/CMakeLists.txt', 'Working_Application/String_Conversion/src/*.cpp', 'Working_Application/String_Conversion/include/*.h') }}
          restore-keys: |
            ${{ runner.os }}-cmake-

      # -------------------------------
      # Install compiler & CMake per OS
      # -------------------------------
      - name: Install compiler and CMake (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake

      - name: Install compiler and CMake (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Install compiler and CMake (Windows)
        if: runner.os == 'Windows'
        run: choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' --yes

      # -------------------------------
      # Configure project with CMake
      # -------------------------------
      - name: Configure String Conversion
        run: cmake -S Working_Application/String_Conversion -B Working_Application/String_Conversion/build -DCMAKE_BUILD_TYPE=Release

      # -------------------------------
      # Build application and tests
      # -------------------------------
      - name: Build project
        run: cmake --build Working_Application/String_Conversion/build --parallel

      # -------------------------------
      # Ensure runTests is built
      # -------------------------------
      - name: Build runTests explicitly
        run: cmake --build Working_Application/String_Conversion/build --target runTests --parallel

      # -------------------------------
      # Run the main application
      # -------------------------------
      - name: Run String Conversion App
        run: ./Working_Application/String_Conversion/build/app

      # -------------------------------
      # Run tests with CTest
      # -------------------------------
      - name: Run String Conversion Tests
        run: ctest --output-on-failure --test-dir Working_Application/String_Conversion/build

      # -------------------------------
      # Upload test logs as artifacts
      # -------------------------------
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.os }}
          path: Working_Application/String_Conversion/build/Testing/Temporary/LastTest.log

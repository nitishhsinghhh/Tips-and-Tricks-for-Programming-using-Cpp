name: C++ CI Working Application

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Working_Application

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install compiler
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Show directory structure (Debug)
        run: ls -R

      # -------------------------------
      # Link Shortener (compile main.cpp only)
      # -------------------------------
      - name: Compile Link Shortener
        run: g++ -std=c++17 -Wall -Wextra ./Link_Shortener/sourcecode.cpp -o ./Link_Shortener/app

      - name: Run Link Shortener
        run: ./Link_Shortener/app

      # -------------------------------
      # Reverse String (compile main.cpp only)
      # -------------------------------
      - name: Compile Reverse String
        run: g++ -std=c++17 -Wall -Wextra ./Reverse_String/sourcecode.cpp -o ./Reverse_String/app

      - name: Run Reverse String
        run: ./Reverse_String/app

      # -------------------------------
      # Roman Integer (compile sourcecode.cpp only)
      # -------------------------------
      - name: Compile Roman Integer
        run: g++ -std=c++17 -Wall -Wextra Roman_Integer/sourcecode.cpp -o ./Roman_Integer/app

      - name: Run Roman Integer
        run: ./Roman_Integer/app

      # -------------------------------
      # String_Conversion (compile sourcecode.cpp only)
      # -------------------------------
      - name: Compile String Conversion App
        run: |
          g++ -O2 \
            -I String_Conversion/include \
            String_Conversion/src/sourcecode.cpp \
            String_Conversion/src/ProcessString.cpp \
            String_Conversion/src/LowerCaseConversion.cpp \
            String_Conversion/src/UpperCaseConversion.cpp \
            String_Conversion/src/CapitalizeWordsConversion.cpp \
            String_Conversion/src/SentenceCaseConversion.cpp \
            String_Conversion/src/ToggleCaseConversion.cpp \
            String_Conversion/src/AlternatingCaseConversion.cpp \
            String_Conversion/src/StringConversionFactory.cpp \
            String_Conversion/src/Client.cpp \
            -o String_Conversion/app

      - name: Run String Conversion App
        run: ./String_Conversion/app

      # -------------------------------
      # String Conversion Tests (GoogleTest)
      # -------------------------------
      - name: Install CMake & GTest
        run: sudo apt-get update && sudo apt-get install -y cmake libgtest-dev

      - name: Clean previous CMake build
        run: rm -rf String_Conversion/build

      - name: Configure String Conversion Tests
        run: cmake -S String_Conversion -B String_Conversion/build

      - name: Build String Conversion Tests
        run: cmake --build String_Conversion/build

      - name: Run String Conversion Tests
        run: ctest --output-on-failure --test-dir String_Conversion/build

      - name: Run String Conversion Tests with Logs
        run: ./String_Conversion/build/runTests --gtest_output=console --gtest_brief=0

name: C++ CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Working_Application

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install compiler
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Show directory structure (Debug)
        run: ls -R

      # -------------------------------
      # Link Shortener
      # -------------------------------
      - name: Compile Link Shortener
        run: g++ ./Link_Shortener/*.cpp -o ./Link_Shortener/app

      - name: Run Link Shortener
        run: ./Link_Shortener/app

      # -------------------------------
      # Reverse String
      # -------------------------------
      - name: Compile Reverse String
        run: g++ ./Reverse_String/*.cpp -o ./Reverse_String/app

      - name: Run Reverse String
        run: ./Reverse_String/app

      # -------------------------------
      # Roman Integer
      # -------------------------------
      - name: Compile Roman Integer
        run: g++ ./Roman_Integer/*.cpp -o ./Roman_Integer/app

      - name: Run Roman Integer
        run: ./Roman_Integer/app

      # -------------------------------
      # String Conversion
      # -------------------------------
      - name: Compile String Conversion
        run: g++ ./String_Conversion/*.cpp -o ./String_Conversion/app

      - name: Run String Conversion
        run: ./String_Conversion/app

      # -------------------------------
      # String Conversion Tests (GoogleTest)
      # -------------------------------
      - name: Install CMake
        run: sudo apt-get update && sudo apt-get install -y cmake

      - name: Configure String Conversion Tests
        run: cmake -S ./String_Conversion -B ./String_Conversion/build

      - name: Build String Conversion Tests
        run: cmake --build ./String_Conversion/build

      - name: Run String Conversion Tests
        run: cd ./String_Conversion/build && ctest --output-on-failureß
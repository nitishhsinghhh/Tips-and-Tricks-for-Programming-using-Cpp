name: Run SQL Server Scripts

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sqlserver:
    runs-on: ubuntu-latest
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        ports:
          - 1433:1433
        env:
          ACCEPT_EULA: Y
          SA_PASSWORD: YourStrong@Pass123
        options: >-
          --health-cmd "exit 0" 
          --health-interval 10s 
          --health-timeout 5s 
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Wait for SQL Server to start
        run: |
          echo "Waiting 30 seconds for SQL Server to initialize..."
          sleep 30

      - name: Run setup.sql (create tables & insert data)
        run: |
          docker exec -i ${{ job.services.sqlserver.id }} \
          /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Pass123' \
          -d master -i ./sql/setup.sql

      - name: Run query.sql and save output
        run: |
          docker exec -i ${{ job.services.sqlserver.id }} \
          /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Pass123' \
          -d master -W -s "," -i ./sql/query.sql > query_results.csv

      - name: Upload query results
        uses: actions/upload-artifact@v4 
        with:
          name: query-results
          path: query_results.csv

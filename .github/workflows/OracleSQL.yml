name: Run Oracle Scripts

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  oracle:
    runs-on: ubuntu-latest
    services:
      oracle:
        image: gvenzl/oracle-xe:latest
        ports:
          - 1521:1521
        env:
          ORACLE_PASSWORD: oracle
        options: >-
          --health-cmd "exit 0"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # 1. Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Wait for Oracle XE to start
      - name: Wait for Oracle XE to initialize
        run: |
          echo "Waiting 60 seconds for Oracle XE to initialize..."
          sleep 60

      # 3. Run OracleSetup.sql (create tables & insert data)
      - name: Run OracleSetup.sql
        run: |
          docker exec -i ${{ job.services.oracle.id }} \
          sqlplus -S system/oracle@XE @/dev/stdin < ./Leetcode/3497/OracleSetup.sql

      # 4. Run OracleQuery.sql and save output
      - name: Run OracleQuery.sql and save output
        run: |
          docker exec -i ${{ job.services.oracle.id }} \
          sqlplus -S system/oracle@XE @/dev/stdin < ./Leetcode/3497/OracleQuery.sql > ./oracle_query_results.csv

      # 5. Upload query results as artifact
      - name: Upload query results
        uses: actions/upload-artifact@v4
        with:
          name: oracle-query-results
          path: ./oracle_query_results.csv

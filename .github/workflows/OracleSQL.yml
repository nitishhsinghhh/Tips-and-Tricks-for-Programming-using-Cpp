name: Run Oracle Scripts

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  oracle:
    runs-on: ubuntu-latest

    services:
      oracle:
        image: gvenzl/oracle-xe
        ports:
          - 1521:1521
        env:
          ORACLE_PASSWORD: ${{ secrets.ORACLE_PASSWORD }}
        options: "--health-cmd 'exit 0' --health-interval 10s --health-timeout 5s --health-retries 5"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Wait for Oracle to start
        run: |
          echo "Waiting for Oracle XE to be ready..."
          for i in {1..20}; do
            echo "Attempt $i: Checking Oracle connection..."
            docker exec -i ${{ job.services.oracle.id }} bash -c "sqlplus -S system/\$ORACLE_PASSWORD@XE <<< 'SELECT 1 FROM dual;'" >/dev/null 2>&1
            if [ $? -eq 0 ]; then
              echo "Oracle is ready!"
              break
            fi
            echo "Oracle not ready, retrying in 5s..."
            sleep 5
          done

      - name: Run OracleSetup.sql
        run: |
          echo "Executing OracleSetup.sql..."
          docker exec -i ${{ job.services.oracle.id }} bash -c "\
            export ORACLE_PASSWORD=${ORACLE_PASSWORD}; \
            sqlplus -S system/\$ORACLE_PASSWORD@XE @/dev/stdin" < ./Leetcode/3497/OracleSetup.sql
          echo "OracleSetup.sql executed successfully."

      - name: Run OracleQuery.sql and save output
        run: |
          echo "Executing OracleQuery.sql..."
          docker exec -i ${{ job.services.oracle.id }} bash -c "\
            export ORACLE_PASSWORD=${ORACLE_PASSWORD}; \
            sqlplus -S system/\$ORACLE_PASSWORD@XE @/dev/stdin" < ./Leetcode/3497/OracleQuery.sql > oracle_query_results.csv
          echo "OracleQuery.sql executed, results saved to oracle_query_results.csv"

      - name: Upload Oracle query results
        uses: actions/upload-artifact@v4
        with:
          name: oracle-query-results
          path: oracle_query_results.csv

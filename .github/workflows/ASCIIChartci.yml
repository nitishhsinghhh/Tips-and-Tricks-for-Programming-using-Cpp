name: C++ CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ASCII/ASCIIChart/code

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install compiler
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Compile PrintableChar.cpp
        run: g++ PrintableChar.cpp -o PrintableChar

      - name: Run program
        run: ./PrintableChar

      - name: Compile BasicPrinter.cpp
        run: g++ BasicPrinter.cpp -o BasicPrinter

      - name: Run program
        run: ./BasicPrinter

      - name: Compile TestedPrinter.cpp
        run: g++ TestedPrinter.cpp -o TestedPrinter

      - name: Run program
        run: ./TestedPrinter

name: C++ CI Working Application

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Working_Application

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install compiler & dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ cmake libgtest-dev

      - name: Show directory structure (Debug)
        run: ls -R

      # -------------------------------
      # String_Conversion_MultithreadedApp
      # -------------------------------
      - name: Compile String Conversion Multi-threaded App
        run: |
          mkdir -p String_Conversion_MultithreadedApp/build
          g++ -O2 -std=c++17 -I String_Conversion_MultithreadedApp/include \
            String_Conversion_MultithreadedApp/src/sourcecode.cpp \
            String_Conversion_MultithreadedApp/src/LowerCaseConversion.cpp \
            String_Conversion_MultithreadedApp/src/UpperCaseConversion.cpp \
            String_Conversion_MultithreadedApp/src/CapitalizeWordsConversion.cpp \
            String_Conversion_MultithreadedApp/src/SentenceCaseConversion.cpp \
            String_Conversion_MultithreadedApp/src/ToggleCaseConversion.cpp \
            String_Conversion_MultithreadedApp/src/MultiThreadManager.cpp \
            -o String_Conversion_MultithreadedApp/build/app

      - name: Run String Conversion Multi-threaded App
        run: ./String_Conversion_MultithreadedApp/build/app

      # -------------------------------
      # Build and run Multi-threaded tests (GoogleTest)
      # -------------------------------
      - name: Configure Multi-threaded Tests
        run: |
          mkdir -p String_Conversion_MultithreadedApp/build/tests
          cd String_Conversion_MultithreadedApp/build/tests
          cmake ../../

      - name: Build Multi-threaded Tests
        run: cmake --build String_Conversion_MultithreadedApp/build/tests

      - name: Run Multi-threaded Tests
        run: ./String_Conversion_MultithreadedApp/build/tests/MultiThreadedTests
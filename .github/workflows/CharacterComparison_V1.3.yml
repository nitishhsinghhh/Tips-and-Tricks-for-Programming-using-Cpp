name: C++ CI/CD Cross-Platform

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    defaults:
      run:
        working-directory: ASCII/CharacterComparison/code/CompareTwoCharacters_V1.2

    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Install g++ / Build tools
      - name: Setup compiler
        if: runner.os != 'Windows'
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: Setup compiler (Windows)
        if: runner.os == 'Windows'
        run: choco install mingw -y

      # Step 3: Compile main.cpp
      - name: Compile main.cpp
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            g++ main.cpp -o CompareTwoCharacters_V1.2.exe
          else
            g++ main.cpp -o CompareTwoCharacters_V1.2
          fi

      # Step 4: Run program
      - name: Run program
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            CompareTwoCharacters_V1.2.exe
          else
            ./CompareTwoCharacters_V1.2
          fi

      # Step 5: Verify files
      - name: List files
        run: ls -l

      # Step 6: Upload executable
      - name: Upload executable
        uses: actions/upload-artifact@v5
        with:
          name: CompareTwoCharacters_V1.2
          path: |
            ASCII/CharacterComparison/code/CompareTwoCharacters_V1.2/CompareTwoCharacters_V1.2
            ASCII/CharacterComparison/code/CompareTwoCharacters_V1.2/CompareTwoCharacters_V1.2.exe

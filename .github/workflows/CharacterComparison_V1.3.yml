name: C++ CI/CD Linux

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ASCII/CharacterComparison/code/CompareTwoCharacters_V1.2

    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Install build-essential (g++ compiler)
      - name: Install g++ compiler
        run: sudo apt-get update && sudo apt-get install -y build-essential

      # Step 3: Compile main.cpp
      - name: Compile main.cpp
        run: g++ main.cpp -o CompareTwoCharacters_V1.2

      # Step 4: Run program (optional)
      - name: Run program
        run: ./CompareTwoCharacters_V1.2

      # Step 5: Verify the file exists
      - name: List files
        run: ls -l

      # Step 6: Upload executable as artifact
      - name: Upload executable
        uses: actions/upload-artifact@v5
        with:
          name: CompareTwoCharacters_V1.2
          path: ASCII/CharacterComparison/code/CompareTwoCharacters_V1.2/CompareTwoCharacters

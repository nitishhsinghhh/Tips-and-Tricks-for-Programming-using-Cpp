name: C++ CI/CD Linux

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ASCII/CharacterComparison/code/CompareTwoCharacters_V1.2

    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Install build-essential (g++ compiler)
      - name: Install g++ compiler
        run: sudo apt-get update && sudo apt-get install -y build-essential

      # Step 3: Compile main.cpp
      - name: Compile main.cpp
        run: g++ main.cpp -o main

      # Step 4: Run program (or unit tests)
      - name: Run program
        run: ./main

      # Step 5: Upload executable as artifact
      - name: Upload executable
        uses: actions/upload-artifact@v3
        with:
          name: CompareTwoChars
          path: main

    